name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2, 8.3, 8.4, 8.5]
        laravel: [9.*, 10.*, 11.*, 12.*, 13.*]
        stability: [prefer-stable]
        include:
          - laravel: 9.*
            testbench: 7.*
            phpunit: ^9.5
          - laravel: 10.*
            testbench: 8.*
            phpunit: ^10.0
          - laravel: 11.*
            testbench: 9.*
            phpunit: ^11.0
          - laravel: 12.*
            testbench: 10.*
            phpunit: ^11.0
          - laravel: 13.*
            testbench: 11.*
            phpunit: ^11.0
        exclude:
          - php: 8.1
            laravel: 11.*
          - php: 8.1
            laravel: 12.*
          - php: 8.1
            laravel: 13.*
          - php: 8.2
            laravel: 13.*
          - php: 8.3
            laravel: 9.*
          - php: 8.4
            laravel: 9.*
          - php: 8.4
            laravel: 10.*
          - php: 8.5
            laravel: 9.*
          - php: 8.5
            laravel: 10.*
          - php: 8.5
            laravel: 11.*
          - php: 8.5
            laravel: 12.*

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "illuminate/database:${{ matrix.laravel }}" "illuminate/container:${{ matrix.laravel }}" "illuminate/console:${{ matrix.laravel }}" --no-interaction --no-update
          composer require "orchestra/testbench:${{ matrix.testbench }}" "phpunit/phpunit:${{ matrix.phpunit }}" --dev --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/phpunit

  lint:
    runs-on: ubuntu-latest
    name: Check Code Style

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test
